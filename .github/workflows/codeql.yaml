name: "CodeQL"

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 7 * * 1" # Mondays at 7:00 AM

permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-22.04
    permissions:
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b71f5aebfc5cee7388c9d7b75e6e36f47787eb9a
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@b71f5aebfc5cee7388c9d7b75e6e36f47787eb9a

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b71f5aebfc5cee7388c9d7b75e6e36f47787eb9a
