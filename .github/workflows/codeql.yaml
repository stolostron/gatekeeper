name: "CodeQL"

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 7 * * 1" # Mondays at 7:00 AM

permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-22.04
    permissions:
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481 # v2.11.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Initialize CodeQL
        uses: github/codeql-action/init@868e2ea5641bfa2e2af1f144664178b4c5575fab
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@868e2ea5641bfa2e2af1f144664178b4c5575fab

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@868e2ea5641bfa2e2af1f144664178b4c5575fab
